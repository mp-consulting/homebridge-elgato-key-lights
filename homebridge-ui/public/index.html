<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elgato Key Lights</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container py-4">
    <!-- Device List View -->
    <div id="listView" class="view active">
      <div class="d-flex align-items-center mb-2">
        <i class="bi bi-lightbulb-fill fs-2 text-warning me-3"></i>
        <div>
          <h1 class="h3 mb-0">Elgato Key Lights</h1>
          <p class="text-body-secondary mb-0">Discover and manage your Key Lights on the network</p>
        </div>
      </div>

      <div class="card border-0 shadow-sm mt-4">
        <div class="card-header bg-transparent border-bottom d-flex justify-content-between align-items-center py-3">
          <h5 class="mb-0">
            <i class="bi bi-broadcast me-2"></i>Devices
          </h5>
          <button class="btn btn-primary" id="discoverBtn" onclick="discoverDevices()">
            <i class="bi bi-search me-1"></i> Discover
          </button>
        </div>
        <div class="card-body p-0">
          <div id="deviceList">
            <div class="text-center py-4">
              <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
              <span class="ms-2 text-body-secondary">Loading configured devices...</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Device Settings View -->
    <div id="settingsView" class="view">
      <div class="d-flex align-items-center mb-4">
        <button class="btn btn-link text-body-secondary p-0 me-3" onclick="showListView()">
          <i class="bi bi-arrow-left fs-4"></i>
        </button>
        <i class="bi bi-lightbulb-fill fs-2 text-warning me-3"></i>
        <div>
          <h1 class="h3 mb-0" id="settingsDeviceName">Device Settings</h1>
          <p class="text-body-secondary mb-0" id="settingsDeviceModel">Key Light</p>
        </div>
        <div class="ms-auto" id="settingsDeviceStatus"></div>
      </div>

      <div id="settingsContent">
        <!-- Dynamic settings content -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
