<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elgato Key Lights</title>
  <!-- Detect theme before CSS renders to avoid flash of wrong theme -->
  <script>
    (function () {
      var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.bsTheme = dark ? 'dark' : 'light';
    }());
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="lib/kit.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container py-4">

    <!-- Device List View -->
    <div id="listView" class="mp-view active">
      <div class="mp-header mb-2">
        <span class="mp-header-icon text-warning"><i class="bi bi-lightbulb-fill"></i></span>
        <div>
          <h1 class="mp-header-title">Elgato Key Lights</h1>
          <p class="mp-header-subtitle">Discover and manage your Key Lights on the network</p>
        </div>
      </div>

      <div class="card border-0 shadow-sm mt-4">
        <div class="card-header bg-transparent border-bottom d-flex justify-content-between align-items-center py-3">
          <h5 class="mb-0">
            <i class="bi bi-broadcast me-2"></i>Devices
          </h5>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" id="addManualBtn" onclick="toggleManualAdd()">
              <i class="bi bi-plus me-1"></i>Add manually
            </button>
            <button class="btn btn-primary" id="discoverBtn" onclick="discoverDevices()">
              <i class="bi bi-search me-1"></i> Discover
            </button>
          </div>
        </div>
        <div id="manualAddForm" class="d-none border-bottom px-3 py-3">
          <div class="row g-2 align-items-end">
            <div class="col">
              <label class="form-label small mb-1">IP Address</label>
              <input type="text" class="form-control form-control-sm" id="manualIp" placeholder="192.168.3.108"
                onkeydown="if(event.key==='Enter') addDeviceByIp()">
            </div>
            <div class="col-auto">
              <label class="form-label small mb-1">Port</label>
              <input type="number" class="form-control form-control-sm" id="manualPort" value="9123" style="width: 90px;"
                onkeydown="if(event.key==='Enter') addDeviceByIp()">
            </div>
            <div class="col-auto">
              <button class="btn btn-primary btn-sm" id="addManualSubmit" onclick="addDeviceByIp()">
                <i class="bi bi-plus-circle me-1"></i>Add
              </button>
            </div>
          </div>
        </div>
        <div class="card-body p-0">
          <div id="deviceList"></div>
        </div>
      </div>

      <div class="mp-footer">
        <a href="https://github.com/mp-consulting/homebridge-elgato-key-lights" target="_blank" rel="noopener">
          <i class="bi bi-github"></i>GitHub
        </a>
        <span class="mp-footer-sep">|</span>
        <a href="https://www.npmjs.com/package/@mp-consulting/homebridge-elgato-key-lights" target="_blank" rel="noopener">
          <i class="bi bi-box-seam"></i>npm
        </a>
      </div>
    </div>

    <!-- Device Settings View -->
    <div id="settingsView" class="mp-view">
      <div class="d-flex align-items-center gap-3 mb-4">
        <button class="btn btn-link text-body-secondary p-0" onclick="showListView()">
          <i class="bi bi-arrow-left fs-4"></i>
        </button>
        <span class="mp-header-icon text-warning"><i class="bi bi-lightbulb-fill"></i></span>
        <div class="flex-grow-1">
          <h1 class="mp-header-title" id="settingsDeviceName">Device Settings</h1>
          <p class="mp-header-subtitle" id="settingsDeviceModel">Key Light</p>
        </div>
        <div id="settingsDeviceStatus"></div>
      </div>

      <div id="settingsContent">
        <!-- Dynamic settings content -->
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="lib/kit.js"></script>
  <script src="app.js"></script>
</body>
</html>
